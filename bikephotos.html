<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Photos — AA Scooters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#F5EFE6;
    --ink:#1A2421;
    --petrol:#0F3D3E;
    --petrol-light:#175A5B;
    --cone:#FF6B35;
    --card:#FFFFFF;
    --line:#DED4C2;
    --muted:#5A6663;
    --ok:#2F855A;
    --err:#C53030;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--sand); color:var(--ink);
    font-family:'Inter',sans-serif; min-height:100vh;
  }
  .topbar{
    background:var(--petrol); padding:14px 16px; display:flex;
    align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .topbar .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .topbar .brand img{ width:28px; height:28px; object-fit:contain; }
  .topbar .brand span{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px;
    color:#fff; letter-spacing:.02em;
  }
  .topbar nav{ display:flex; gap:16px; flex-wrap:wrap; }
  .topbar nav a{
    color:#CFE3E0; text-decoration:none; font-size:12.5px; font-weight:500;
    padding:3px 0; border-bottom:2px solid transparent;
  }
  .topbar nav a:hover{ color:#fff; }
  .topbar nav a.active{ color:#fff; border-bottom-color:var(--cone); }
  .page-head{ max-width:520px; margin:0 auto; padding:22px 16px 4px; }
  .page-head h1{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:26px;
    color:var(--petrol); margin:0;
  }
  .page-head .sub{ color:var(--muted); font-size:13px; margin-top:6px; }

  main{ max-width:520px; margin:0 auto; padding:16px 16px 60px; }

  .field{ position:relative; margin-bottom:6px; }
  input[type="text"]{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    font-size:15px; font-family:'Inter',sans-serif; background:#fff; color:var(--ink);
  }
  input[type="text"]:focus{ outline:none; border-color:var(--petrol-light); }
  .ac-list{
    position:absolute; left:0; right:0; top:100%;
    background:#fff; border:1px solid var(--line); border-top:none;
    border-radius:0 0 9px 9px;
    max-height:220px; overflow-y:auto;
    z-index:20; display:none;
    box-shadow:0 8px 18px rgba(15,61,62,.1);
  }
  .ac-list.show{ display:block; }
  .ac-item{
    padding:10px 12px; font-size:14px; cursor:pointer;
    border-bottom:1px solid #F0EBE0;
  }
  .ac-item:last-child{ border-bottom:none; }
  .ac-item:hover, .ac-item.hi{ background:#F5EFE6; }
  .ac-item mark{ background:#FFE3D2; color:var(--ink); border-radius:2px; }

  .load-status{
    font-size:12px; color:#B36A2E; background:#FFF3E6; border:1px solid #F3D9B8;
    border-radius:7px; padding:7px 10px; margin-bottom:12px; display:none;
  }
  .load-status.show{ display:block; }

  .empty-hint{ font-size:13px; color:#8A948F; padding:14px 2px; text-align:center; }

  .bike-panel{ margin-top:18px; }
  .bike-panel-head{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:12px;
  }
  .bike-panel-head h2{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:20px;
    color:var(--petrol); margin:0;
  }
  .change-bike{
    background:none; border:none; color:var(--petrol); text-decoration:underline;
    font-family:'Inter',sans-serif; font-size:12.5px; font-weight:500;
    cursor:pointer; padding:0;
  }

  .upload-card{
    background:var(--card); border:1px dashed var(--line); border-radius:12px;
    padding:16px; text-align:center; margin-bottom:16px;
  }
  .upload-btn{
    display:inline-block; padding:12px 20px; border-radius:10px;
    background:var(--cone); color:#fff;
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:14px;
    letter-spacing:.04em; text-transform:uppercase; cursor:pointer; border:none;
  }
  .upload-btn:active{ transform:scale(.98); }
  .upload-btn input{ display:none; }
  .upload-hint{ font-size:12px; color:var(--muted); margin-top:8px; }

  .upload-status{
    font-size:13px; margin-top:10px; padding:8px 10px; border-radius:8px; display:none;
  }
  .upload-status.show{ display:block; }
  .upload-status.ok{ background:#E8F5EE; color:var(--ok); border:1px solid #BEE3CE; }
  .upload-status.err{ background:#FCEBEB; color:var(--err); border:1px solid #F3C6C6; }
  .upload-status.pending{ background:#FFF3E6; color:#B36A2E; border:1px solid #F3D9B8; }

  .gallery{
    display:grid; grid-template-columns:1fr 1fr; gap:10px;
  }
  .photo-card{
    position:relative; background:var(--card); border:1px solid var(--line);
    border-radius:10px; overflow:hidden; aspect-ratio:1/1;
  }
  .photo-card img{
    width:100%; height:100%; object-fit:cover; display:block;
    background:#EFE8DA;
  }
  .photo-card .del-btn{
    position:absolute; top:6px; right:6px; width:28px; height:28px;
    border-radius:50%; border:none; background:rgba(26,36,33,.65); color:#fff;
    font-size:14px; line-height:28px; text-align:center; cursor:pointer; padding:0;
  }
  .photo-card .del-btn:active{ background:rgba(197,48,48,.9); }
  .photo-card.uploading::after{
    content:"Uploading…";
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(245,239,230,.85); color:var(--muted); font-size:12px;
  }

  .gallery-empty{
    grid-column:1 / -1; font-size:13px; color:#8A948F; padding:24px 2px; text-align:center;
  }

  .hidden{ display:none; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">
    <img src="https://scooterrentalchiangmai.com/wp-content/uploads/2025/02/cropped-logo-3333-101x105.png" alt="AA Scooters logo">
    <span>AA Scooters</span>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="customers.html">Customer Record</a>
    <a href="pricing.html">Price Calculator</a>
    <a href="parts.html">Parts &amp; Oil</a>
    <a href="oilchange.html">Oil Change</a>
    <a href="bikes.html">Bikes Status</a>
    <a href="bikephotos.html" class="active">Bike Photos</a>
  </nav>
</div>

<div class="page-head">
  <h1>Bike Photos</h1>
  <div class="sub">Search a bike to view, upload, or delete its photos</div>
</div>

<main>
  <div id="searchSection">
    <div class="field">
      <input type="text" id="bikeSearch" placeholder="Search bikes… e.g. GT, Aerox" autocomplete="off">
      <div class="ac-list" id="bikeAcList"></div>
    </div>
    <div class="load-status" id="loadStatus">Loading bikes…</div>
  </div>

  <div class="bike-panel hidden" id="bikePanel">
    <div class="bike-panel-head">
      <h2 id="selectedBikeName"></h2>
      <button type="button" class="change-bike" id="changeBikeBtn">Change bike</button>
    </div>

    <div class="upload-card">
      <label class="upload-btn">
        📷 Add photos
        <input type="file" id="photoInput" accept="image/*" multiple>
      </label>
      <div class="upload-hint">JPG or PNG, multiple at once is fine.</div>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <div class="load-status" id="galleryLoadStatus">Loading photos…</div>
    <div class="gallery" id="gallery"></div>
  </div>
</main>

<script>
const scriptUrl = 'https://script.google.com/macros/s/AKfycbxWV72e8u9NwBZS43RdOhNZsNCBa-OFZV5aEKtMgsb0MwExfl9XNt7nTvPrK--hEXTFhQ/exec';

let bikeNames = [];
let selectedBike = null;

const searchInput = document.getElementById('bikeSearch');
const acList = document.getElementById('bikeAcList');
const searchSection = document.getElementById('searchSection');
const bikePanel = document.getElementById('bikePanel');
const selectedBikeName = document.getElementById('selectedBikeName');
const gallery = document.getElementById('gallery');
const photoInput = document.getElementById('photoInput');
const uploadStatus = document.getElementById('uploadStatus');

function setLoadStatus(id, msg) {
  const el = document.getElementById(id);
  if (!msg) { el.classList.remove('show'); return; }
  el.textContent = msg;
  el.classList.add('show');
}

function tokenMatch(value, query) {
  if (!query) return true;
  const v = (value || '').toString().toLowerCase();
  const tokens = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  return tokens.every(t => v.includes(t));
}

function highlight(value, query) {
  let out = String(value || '');
  const tokens = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  tokens.forEach(t => {
    if (!t) return;
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    out = out.replace(re, '<mark>$1</mark>');
  });
  return out;
}

function loadBikeNames() {
  setLoadStatus('loadStatus', 'Loading bikes…');
  return fetch(scriptUrl + '?action=parts')
    .then(res => res.json())
    .then(data => {
      if (!data.success) throw new Error(data.error || 'Could not load bikes');
      const bikeHeader = data.headers[0];
      bikeNames = data.rows
        .map(r => (r[bikeHeader] || '').toString().trim())
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));
      setLoadStatus('loadStatus', null);
    })
    .catch(err => {
      setLoadStatus('loadStatus', 'Could not load bikes: ' + err.message);
    });
}

function closeAc() {
  acList.classList.remove('show');
  acList.innerHTML = '';
}

function openAc(query) {
  const options = bikeNames.filter(n => tokenMatch(n, query)).slice(0, 8);
  if (!query || options.length === 0) { closeAc(); return; }
  acList.innerHTML = options.map((v, i) =>
    `<div class="ac-item" data-index="${i}">${highlight(v, query)}</div>`
  ).join('');
  acList.classList.add('show');
  Array.from(acList.children).forEach((el, i) => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      selectBike(options[i]);
    });
  });
}

searchInput.addEventListener('input', () => openAc(searchInput.value.trim()));
searchInput.addEventListener('focus', () => openAc(searchInput.value.trim()));
document.addEventListener('click', (e) => {
  if (!searchInput.contains(e.target) && !acList.contains(e.target)) closeAc();
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAc();
});

function selectBike(name) {
  selectedBike = name;
  closeAc();
  searchInput.value = '';
  searchSection.classList.add('hidden');
  bikePanel.classList.remove('hidden');
  selectedBikeName.textContent = name;
  uploadStatus.className = 'upload-status';
  loadGallery();
}

document.getElementById('changeBikeBtn').addEventListener('click', () => {
  selectedBike = null;
  bikePanel.classList.add('hidden');
  searchSection.classList.remove('hidden');
  searchInput.focus();
});

function photoCardHtml(photo) {
  return `
    <div class="photo-card" data-id="${photo.id}">
      <img src="${photo.url}" alt="${selectedBike || 'Bike'} photo" loading="lazy">
      <button type="button" class="del-btn" data-id="${photo.id}" title="Delete photo">✕</button>
    </div>
  `;
}

function loadGallery() {
  if (!selectedBike) return;
  setLoadStatus('galleryLoadStatus', 'Loading photos…');
  gallery.innerHTML = '';
  fetch(scriptUrl + '?action=bikePhotos&bike=' + encodeURIComponent(selectedBike))
    .then(res => res.json())
    .then(data => {
      if (!data.success) throw new Error(data.error || 'Could not load photos');
      setLoadStatus('galleryLoadStatus', null);
      renderGallery(data.photos || []);
    })
    .catch(err => {
      setLoadStatus('galleryLoadStatus', 'Could not load photos: ' + err.message);
    });
}

function renderGallery(photos) {
  if (!photos.length) {
    gallery.innerHTML = '<div class="gallery-empty">No photos yet for this bike.</div>';
    return;
  }
  gallery.innerHTML = photos.map(photoCardHtml).join('');
  attachDeleteHandlers();
}

function attachDeleteHandlers() {
  gallery.querySelectorAll('.del-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.getAttribute('data-id');
      if (!confirm('Delete this photo? This cannot be undone from here.')) return;
      const card = btn.closest('.photo-card');
      card.style.opacity = '0.4';
      btn.disabled = true;
      fetch(scriptUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: 'deletePhoto', fileId: id })
      })
        .then(res => res.json())
        .then(data => {
          if (!data.success) throw new Error(data.error || 'Could not delete');
          card.remove();
          if (!gallery.querySelector('.photo-card')) {
            gallery.innerHTML = '<div class="gallery-empty">No photos yet for this bike.</div>';
          }
        })
        .catch(err => {
          alert('Could not delete: ' + err.message);
          card.style.opacity = '1';
          btn.disabled = false;
        });
    });
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function uploadOne(file) {
  return fileToBase64(file).then(base64 => {
    return fetch(scriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        action: 'uploadPhoto',
        bike: selectedBike,
        filename: file.name,
        mimeType: file.type || 'image/jpeg',
        base64: base64
      })
    }).then(res => res.json());
  });
}

photoInput.addEventListener('change', async () => {
  const files = Array.from(photoInput.files || []);
  if (!files.length) return;

  // Clear the "no photos yet" placeholder if present, before adding uploading cards.
  if (gallery.querySelector('.gallery-empty')) gallery.innerHTML = '';

  uploadStatus.className = 'upload-status pending show';
  uploadStatus.textContent = 'Uploading ' + files.length + (files.length === 1 ? ' photo…' : ' photos…');

  let successCount = 0;
  let firstError = null;

  for (const file of files) {
    const placeholder = document.createElement('div');
    placeholder.className = 'photo-card uploading';
    gallery.prepend(placeholder);

    try {
      const data = await uploadOne(file);
      if (!data.success) throw new Error(data.error || 'Upload failed');
      placeholder.outerHTML = photoCardHtml(data.photo);
      successCount++;
    } catch (err) {
      placeholder.remove();
      firstError = err.message;
    }
  }

  attachDeleteHandlers();
  photoInput.value = '';

  if (firstError && successCount === 0) {
    uploadStatus.className = 'upload-status err show';
    uploadStatus.textContent = 'Could not upload: ' + firstError;
  } else if (firstError) {
    uploadStatus.className = 'upload-status err show';
    uploadStatus.textContent = successCount + ' uploaded, but some failed: ' + firstError;
  } else {
    uploadStatus.className = 'upload-status ok show';
    uploadStatus.textContent = successCount + (successCount === 1 ? ' photo' : ' photos') + ' uploaded.';
  }

  if (!gallery.querySelector('.photo-card')) {
    gallery.innerHTML = '<div class="gallery-empty">No photos yet for this bike.</div>';
  }
});

loadBikeNames();
</script>

</body>
</html>
