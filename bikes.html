<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikes Status — AA Scooters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#F5EFE6;
    --ink:#1A2421;
    --petrol:#0F3D3E;
    --petrol-light:#175A5B;
    --cone:#FF6B35;
    --card:#FFFFFF;
    --line:#DED4C2;
    --muted:#5A6663;
    --ok:#2F855A;
    --rented:#B7791F;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--sand); color:var(--ink);
    font-family:'Inter',sans-serif; min-height:100vh;
  }
  .topbar{
    background:var(--petrol); padding:14px 16px; display:flex;
    align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px;
  }
  .topbar .brand{ display:flex; align-items:center; gap:8px; text-decoration:none; }
  .topbar .brand img{ width:28px; height:28px; object-fit:contain; }
  .topbar .brand span{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:15px;
    color:#fff; letter-spacing:.02em;
  }
  .topbar nav{ display:flex; gap:16px; flex-wrap:wrap; }
  .topbar nav a{
    color:#CFE3E0; text-decoration:none; font-size:12.5px; font-weight:500;
    padding:3px 0; border-bottom:2px solid transparent;
  }
  .topbar nav a:hover{ color:#fff; }
  .topbar nav a.active{ color:#fff; border-bottom-color:var(--cone); }
  .page-head{ max-width:520px; margin:0 auto; padding:22px 16px 4px; }
  .page-head h1{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:26px;
    color:var(--petrol); margin:0;
  }
  .page-head .sub{ color:var(--muted); font-size:13px; margin-top:6px; }

  main{ max-width:520px; margin:0 auto; padding:16px 16px 60px; }

  .search-wrap{ position:relative; margin-bottom:6px; }
  .search-wrap input{
    width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    font-size:15px; font-family:'Inter',sans-serif; background:#fff; color:var(--ink);
  }
  .search-wrap input:focus{ outline:none; border-color:var(--petrol-light); }
  .ac-list{
    position:absolute; left:0; right:0; top:100%;
    background:#fff; border:1px solid var(--line); border-top:none;
    border-radius:0 0 9px 9px;
    max-height:220px; overflow-y:auto;
    z-index:20; display:none;
    box-shadow:0 8px 18px rgba(15,61,62,.1);
  }
  .ac-list.show{ display:block; }
  .ac-item{
    padding:10px 12px; font-size:14px; cursor:pointer;
    border-bottom:1px solid #F0EBE0;
  }
  .ac-item:last-child{ border-bottom:none; }
  .ac-item:hover, .ac-item.hi{ background:#F5EFE6; }
  .ac-item mark{ background:#FFE3D2; color:var(--ink); border-radius:2px; }

  .load-status{
    font-size:12px; color:#B36A2E; background:#FFF3E6; border:1px solid #F3D9B8;
    border-radius:7px; padding:7px 10px; margin-bottom:12px; display:none;
  }
  .load-status.show{ display:block; }

  .results-count{
    font-size:12px; color:#7A8A86; margin:14px 2px 10px;
    font-family:'Barlow Condensed',sans-serif; letter-spacing:.06em; text-transform:uppercase;
  }

  .bike-card{
    background:var(--card); border:1px solid var(--line); border-left:5px solid var(--line);
    border-radius:10px; padding:12px 14px; margin-bottom:10px;
  }
  .bike-card.rented{ border-left-color:var(--rented); }
  .bike-card.not-rented{ border-left-color:var(--ok); }

  .bc-top{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
  .bc-name{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:17px; color:var(--petrol);
  }
  .bc-tag{
    font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:12.5px;
    letter-spacing:.04em; text-transform:uppercase; white-space:nowrap;
  }
  .bc-tag.rented{ color:var(--rented); }
  .bc-tag.not-rented{ color:var(--ok); }
  .bc-renter{
    font-size:12.5px; color:var(--petrol); margin-top:6px;
    background:#EEF5F2; border:1px solid #D8E8E1; border-radius:7px;
    padding:5px 9px; display:inline-block;
  }
  .bc-renter b{ font-weight:700; }
  .bc-details{ font-size:12.5px; color:var(--muted); margin-top:6px; line-height:1.5; }
  .bc-details b{ color:var(--ink); font-weight:600; }

  .empty-hint{ font-size:13px; color:#8A948F; padding:14px 2px; text-align:center; }
</style>
</head>
<body>

<div class="topbar">
  <a class="brand" href="index.html">
    <img src="https://scooterrentalchiangmai.com/wp-content/uploads/2025/02/cropped-logo-3333-101x105.png" alt="AA Scooters logo">
    <span>AA Scooters</span>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="customers.html">Customer Record</a>
    <a href="pricing.html">Price Calculator</a>
    <a href="parts.html">Parts &amp; Oil</a>
    <a href="oilchange.html">Oil Change</a>
    <a href="bikes.html" class="active">Bikes Status</a>
    <a href="bikephotos.html">Bike Photos</a>
    <a href="reply-assistant.html">Reply Assistant</a>
  </nav>
</div>

<div class="page-head">
  <h1>Bikes Status</h1>
  <div class="sub">All bikes, who they're rented to, and when they're due back</div>
</div>

<main>
  <div class="search-wrap field">
    <input type="text" id="bikeSearch" placeholder="Search bikes… e.g. GT, Aerox" autocomplete="off">
    <div class="ac-list" id="bikeAcList"></div>
  </div>

  <div class="load-status" id="loadStatus">Loading bikes…</div>
  <div class="results-count" id="resultsCount"></div>
  <div id="listBox"></div>
</main>

<script>
const scriptUrl = 'https://script.google.com/macros/s/AKfycbxWV72e8u9NwBZS43RdOhNZsNCBa-OFZV5aEKtMgsb0MwExfl9XNt7nTvPrK--hEXTFhQ/exec';

let bikeNames = [];    // list of bike name strings, alphabetically sorted
let customerRows = null;

function setLoadStatus(msg) {
  const el = document.getElementById('loadStatus');
  if (!msg) { el.classList.remove('show'); return; }
  el.textContent = msg;
  el.classList.add('show');
}

function loadData() {
  setLoadStatus('Loading bikes…');
  return Promise.all([
    fetch(scriptUrl + '?action=parts').then(res => res.json()),
    fetch(scriptUrl).then(res => res.json()).catch(err => ({ success: false, error: err.message }))
  ])
    .then(([partsResult, customerResult]) => {
      if (!partsResult.success) throw new Error(partsResult.error || 'Could not load bikes');
      const bikeHeader = partsResult.headers[0];
      bikeNames = partsResult.rows
        .map(r => (r[bikeHeader] || '').toString().trim())
        .filter(Boolean)
        .sort((a, b) => a.localeCompare(b, undefined, { sensitivity: 'base' }));

      if (customerResult && customerResult.success) {
        customerRows = customerResult.rows;
        setLoadStatus(null);
      } else {
        customerRows = [];
        setLoadStatus('Rental info unavailable (' + (customerResult && customerResult.error ? customerResult.error : 'unknown error') + ') — bikes will show as "Not rented".');
      }
      render();
    })
    .catch(err => {
      setLoadStatus('Could not load bikes: ' + err.message);
    });
}

// Parse dates in the dd/MM/yyyy format the sheet returns.
function parseFlexibleDate(str) {
  if (!str) return null;
  str = String(str).trim();
  var slashMatch = str.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if (slashMatch) {
    var d = parseInt(slashMatch[1], 10), m = parseInt(slashMatch[2], 10) - 1, y = parseInt(slashMatch[3], 10);
    var dt = new Date(y, m, d);
    if (!isNaN(dt.getTime())) return dt;
  }
  var dt2 = new Date(str);
  if (!isNaN(dt2.getTime())) return dt2;
  return null;
}

function formatDateDisplay(str) {
  var date = parseFlexibleDate(str);
  if (!date) return str || '—';
  return date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}

function normalizeBikeName(s) {
  return (s || '').toString()
    .toLowerCase()
    .replace(/\([^)]*\)/g, ' ')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim()
    .replace(/\s+/g, ' ');
}

function bikeNamesMatch(a, b) {
  const na = normalizeBikeName(a);
  const nb = normalizeBikeName(b);
  if (!na || !nb) return false;
  if (na === nb) return true;
  return na.includes(nb) || nb.includes(na);
}

// Finds the customer record currently holding this bike: same bike model,
// with a return date of today or later. The same bike can have several old,
// already-returned rows earlier in the sheet — if more than one row still
// qualifies, the one lowest down / most recently entered in the sheet wins,
// since that's the actual current booking (more reliable than trusting a
// possibly mistyped "renting date from" for the tiebreak).
function findCurrentRenter(bikeName) {
  if (!customerRows || !customerRows.length) return null;
  if (!normalizeBikeName(bikeName)) return null;

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const candidates = customerRows
    .map((r, sheetIndex) => ({ r, sheetIndex }))
    .filter(({ r }) => {
      if (!bikeNamesMatch(r.bikeModel, bikeName)) return false;
      const ret = parseFlexibleDate(r.returnDate);
      if (!ret) return false;
      ret.setHours(0, 0, 0, 0);
      return ret >= today;
    });

  if (!candidates.length) return null;

  candidates.sort((a, b) => b.sheetIndex - a.sheetIndex);

  return candidates[0].r;
}

// Finds the most recent PAST rental of this bike (return date before today) —
// used to order "not rented" bikes by how recently they came back.
function findLastReturn(bikeName) {
  if (!customerRows || !customerRows.length) return null;
  if (!normalizeBikeName(bikeName)) return null;

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  const candidates = customerRows.filter(r => {
    if (!bikeNamesMatch(r.bikeModel, bikeName)) return false;
    const ret = parseFlexibleDate(r.returnDate);
    if (!ret) return false;
    ret.setHours(0, 0, 0, 0);
    return ret < today;
  });

  if (!candidates.length) return null;

  candidates.sort((a, b) => {
    const da = parseFlexibleDate(a.returnDate) || new Date(0);
    const db = parseFlexibleDate(b.returnDate) || new Date(0);
    return db - da;
  });

  return candidates[0];
}

// Case-insensitive, multi-word "contains all tokens" matcher — same rule
// used on the Customer Record search fields.
function tokenMatch(value, query) {
  if (!query) return true;
  const v = (value || '').toString().toLowerCase();
  const tokens = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  return tokens.every(t => v.includes(t));
}

function highlight(value, query) {
  let out = String(value || '');
  const tokens = query.toLowerCase().trim().split(/\s+/).filter(Boolean);
  tokens.forEach(t => {
    if (!t) return;
    const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'ig');
    out = out.replace(re, '<mark>$1</mark>');
  });
  return out;
}

function bikeCardHtml(name, renter, query) {
  const rented = !!renter;
  const cls = rented ? 'rented' : 'not-rented';

  const renterLine = rented
    ? `<div class="bc-renter">🧑‍✈️ Rented to: <b>${renter.name || 'Unknown'}</b>${renter.contact ? ' &nbsp;·&nbsp; ' + renter.contact : ''}</div>`
    : '';

  const details = rented
    ? `<b>Due back:</b> ${formatDateDisplay(renter.returnDate)}`
    : `Not rented`;

  return `
    <div class="bike-card ${cls}">
      <div class="bc-top">
        <div class="bc-name">${highlight(name, query)}</div>
        <div class="bc-tag ${cls}">${rented ? 'Rented' : 'Not rented'}</div>
      </div>
      ${renterLine}
      <div class="bc-details">${details}</div>
    </div>
  `;
}

function render() {
  const listBox = document.getElementById('listBox');
  const countEl = document.getElementById('resultsCount');
  const query = document.getElementById('bikeSearch').value.trim();

  const matches = bikeNames
    .filter(name => tokenMatch(name, query))
    .map(name => {
      const renter = findCurrentRenter(name);
      const lastReturn = renter ? null : findLastReturn(name);
      return { name, renter, lastReturn };
    });

  // Rented bikes first, soonest due-back at the very top. Not-rented bikes
  // follow, most-recently-returned first; bikes with no rental history at
  // all go last, alphabetically.
  matches.sort((a, b) => {
    if (a.renter && b.renter) {
      const da = parseFlexibleDate(a.renter.returnDate) || new Date(8640000000000000);
      const db = parseFlexibleDate(b.renter.returnDate) || new Date(8640000000000000);
      return da - db;
    }
    if (a.renter && !b.renter) return -1;
    if (!a.renter && b.renter) return 1;

    const da = a.lastReturn ? parseFlexibleDate(a.lastReturn.returnDate) : null;
    const db = b.lastReturn ? parseFlexibleDate(b.lastReturn.returnDate) : null;
    if (da && db) return db - da;
    if (da && !db) return -1;
    if (!da && db) return 1;
    return a.name.localeCompare(b.name, undefined, { sensitivity: 'base' });
  });

  countEl.textContent = matches.length + (matches.length === 1 ? ' bike' : ' bikes');

  if (!matches.length) {
    listBox.innerHTML = '<div class="empty-hint">No matching bikes.</div>';
    return;
  }

  listBox.innerHTML = matches.map(m => bikeCardHtml(m.name, m.renter, query)).join('');
}

/* ---------------- Search box with live narrowing + autocomplete ---------------- */

const searchInput = document.getElementById('bikeSearch');
const acList = document.getElementById('bikeAcList');
let hiIndex = -1;

function closeAc() {
  acList.classList.remove('show');
  acList.innerHTML = '';
  hiIndex = -1;
}

function openAc(query) {
  const options = bikeNames.filter(n => tokenMatch(n, query)).slice(0, 8);
  if (!query || options.length === 0) { closeAc(); return; }
  acList.innerHTML = options.map((v, i) =>
    `<div class="ac-item" data-index="${i}">${highlight(v, query)}</div>`
  ).join('');
  acList.classList.add('show');
  hiIndex = -1;
  Array.from(acList.children).forEach((el, i) => {
    el.addEventListener('mousedown', (e) => {
      e.preventDefault();
      searchInput.value = options[i];
      closeAc();
      render();
    });
  });
  acList._options = options;
}

searchInput.addEventListener('input', () => {
  openAc(searchInput.value.trim());
  render();
});

searchInput.addEventListener('focus', () => {
  openAc(searchInput.value.trim());
});

searchInput.addEventListener('keydown', (e) => {
  const items = Array.from(acList.children);
  if (e.key === 'Enter') {
    // Enter just confirms the current text as the filter (list is already
    // narrowed live) and closes the suggestion dropdown.
    e.preventDefault();
    if (hiIndex >= 0 && acList._options) {
      searchInput.value = acList._options[hiIndex];
    }
    closeAc();
    render();
    return;
  }
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    hiIndex = Math.min(hiIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('hi', i === hiIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    hiIndex = Math.max(hiIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('hi', i === hiIndex));
  } else if (e.key === 'Escape') {
    closeAc();
  }
});

document.addEventListener('click', (e) => {
  if (!searchInput.contains(e.target) && !acList.contains(e.target)) closeAc();
});

loadData();
</script>

</body>
</html>
